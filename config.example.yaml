# ============================================================
# Yande Gallery Desktop 配置文件
# ============================================================
#
# 本文件由 .env 中的 CONFIG_DIR 指定存放位置
# 默认位于: ~/.yandegallery/config.yaml
#
# 目录结构说明:
#   CONFIG_DIR/                    （由 .env CONFIG_DIR 指定，默认 ~/.yandegallery）
#     config.yaml                  本配置文件
#     gallery.db                   SQLite 数据库
#     data/                        运行数据目录（由下方 dataPath 指定）
#       thumbnails/                缩略图缓存（WebP 格式）
#       cache/                     Booru 图片缓存
#
# 路径规则:
#   - database.path    相对于 CONFIG_DIR
#   - dataPath         相对于 CONFIG_DIR
#   - thumbnails 等    相对于 dataPath
#   - downloads.path  建议使用绝对路径
#   - 所有路径字段均支持绝对路径，绝对路径时忽略基准目录
# ============================================================

# 运行数据目录（缩略图、缓存等）
# 支持绝对路径和相对路径（相对于 CONFIG_DIR）
dataPath: data

# -------- 数据库 --------
database:
  # 相对于 CONFIG_DIR（与 config.yaml 同级）
  path: gallery.db

# -------- 下载 --------
downloads:
  # 建议使用绝对路径，如 M:\downloads 或 /home/user/downloads
  path: ./downloads

# -------- 图库 --------
# 注：本地图库已归一到数据库（gallery.db 的 galleries 表），通过应用「设置 → 图库文件夹」管理，
#     不再在此配置；旧版的 galleries.folders 会在首次启动时自动迁移进数据库。

# -------- 缩略图 --------
thumbnails:
  # 相对于 dataPath
  cachePath: thumbnails
  maxWidth: 800
  maxHeight: 800
  quality: 92
  effort: 3
  format: webp
  # 1600px 预览档（移动端全屏大图）
  preview:
    cachePath: previews
    maxWidth: 1600
    maxHeight: 1600
    quality: 88
    effort: 3
    format: webp

# -------- 应用 --------
# 注：当前仅 autoScan 生效（其余历史字段已移除）
app:
  autoScan: true

# -------- 单图下载并发（历史命名 yande）--------
# 注：当前仅 maxConcurrentDownloads 生效（Booru 逐张下载并发上限）
yande:
  maxConcurrentDownloads: 5

# -------- 网络/代理 --------
network:
  proxy:
    # true: 优先使用此自定义代理；false: 回退到系统代理，再直连
    enabled: false
    protocol: http           # http | https | socks5
    host: 127.0.0.1
    port: 7890
    username: ''
    password: ''

# -------- Booru 浏览与下载 --------
booru:
  appearance:
    gridSize: 330            # 图片网格大小（像素）
    previewQuality: auto     # auto | low | medium | high | original
    itemsPerPage: 60
    paginationPosition: both # top | bottom | both
    pageMode: pagination     # pagination | infinite
    spacing: 16              # 间距（像素）
    borderRadius: 8          # 圆角（像素）
    margin: 24               # 边距（像素）
    maxCacheSizeMB: 500      # 图片缓存上限（MB）
  download:
    # 文件名模板，支持的 token:
    #   {id} {md5} {md5:maxlength=8} {extension}
    #   {width} {height} {rating} {score} {site}
    #   {tags:maxlength=50} {source} {artist} {character} {copyright} {date}
    filenameTemplate: '{site}_{id}_{md5}.{extension}'
    # Token 默认选项：命名模板中未显式指定时的后备策略
    # 可选键：limit / maxlength / case / delimiter / unsafe / format /
    #         single_letter / pad_left / sort:{attribute,order}
    tokenDefaults:
      tags:
        limit: 10
        maxlength: 50
        case: lower           # lower | upper | none
        delimiter: _
        unsafe: false
      artist:
        limit: 5
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      character:
        limit: 5
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      copyright:
        limit: 3
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      date:
        format: yyyy-MM-dd
      rating:
        case: lower
        single_letter: false
      site:
        case: lower
      id:
        pad_left: 0
      md5:
        maxlength: 32
      width:
        unsafe: true
      height:
        unsafe: true

# -------- 批量下载 --------
bulkDownload:
  # 同一时刻允许的活跃会话数（dryRun + running），超限会话进入 queued
  maxConcurrentSessions: 3

# -------- 桌面通知 --------
# 三级判断：enabled AND byStatus[status] AND 任务级 notifications
notifications:
  enabled: true              # 全局通知总开关
  byStatus:
    completed: true          # 会话成功完成时弹通知
    failed: true             # 会话失败时弹通知
    allSkipped: true         # 全部跳过时弹通知
  singleDownload:
    enabled: false           # 单次下载（Booru 逐张）是否弹通知
  clickAction: openDownloadHub  # focus | openDownloadHub | openSessionDetail

# -------- 桌面行为 --------
desktop:
  closeAction: hide-to-tray   # 点 X 时行为：hide-to-tray | quit | ask
  autoLaunch: false           # 开机自启
  startMinimized: false       # 自启时隐藏到托盘
  hardwareAcceleration: false # 下次启动时启用 Chromium/Electron GPU 硬件加速

# -------- 本机 API 服务（可选）--------
apiService:
  enabled: false
  mode: localhost            # localhost | lan
  port: 38947
  apiKey: ''                 # 留空则由界面生成；敏感，勿外泄
  permissions:
    galleryRead: true
    imageRead: true
    imageBinary: false
    # 图片写操作（删除/标签编辑，移动端用）
    imageWrite: false
    # 图集写操作（新建/重命名/删除/成员管理，移动端用）
    galleryWrite: false
    booruRead: true
    booruWrite: false
    favoriteTagsRead: true
    favoriteTagsWrite: false
    downloadsRead: true
    downloadsControl: false
    eventsSubscribe: false
    apiLogsRead: false
  logs:
    enabled: false
    visibleInUi: false
    retentionDays: 14
    maxEntries: 1000

# -------- 移动端同步（机器生成，勿手改）--------
sync:
  # 服务器身份标识，首次被移动端请求时自动生成
  serverId: ''
  # 数据代际：备份恢复/根目录迁移后自动 +1，手机端据此全量重建镜像
  dataVersion: 1

# -------- UI 偏好（运行时自动写入，一般无需手改）--------
# ui.pagePreferences.* 由应用在交互中自动维护：
#   菜单拖拽顺序、固定页、快捷访问、侧边栏宽度、各页排序/筛选/页码记忆。
# 故此处不展开示例。
