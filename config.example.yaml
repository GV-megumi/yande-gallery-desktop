database:
  path: data/gallery.db
  logging: true
downloads:
  path: ./downloads
  createSubfolders: true
  subfolderFormat:
    - tags
    - date
galleries:
  folders:
    - path: /path/to/your/images
      name: my_gallery
      autoScan: true
      recursive: true
      extensions:
        - .jpg
        - .jpeg
        - .png
        - .gif
        - .webp
        - .bmp
thumbnails:
  cachePath: data/thumbnails
  maxWidth: 1000
  maxHeight: 1000
  quality: 95
  format: webp
app:
  recentImagesCount: 100
  pageSize: 50
  defaultViewMode: grid
  showImageInfo: true
  autoScan: true
  autoScanInterval: 30
yande:
  apiUrl: https://yande.re/post.json
  pageSize: 20
  downloadTimeout: 60
  maxConcurrentDownloads: 5
logging:
  level: info
  filePath: data/app.log
  consoleOutput: true
  maxFileSize: 10
  maxFiles: 5
network:
  proxy:
    enabled: false
    protocol: http
    host: 127.0.0.1
    port: '7890'
    username: ''
    password: ''
booru:
  appearance:
    gridSize: 300
    previewQuality: original
    itemsPerPage: 20
    paginationPosition: both
    pageMode: pagination
    spacing: 16
    borderRadius: 8
    margin: 24
    maxCacheSizeMB: 3000
  download:
    filenameTemplate: '{id}_{md5:maxlength=8}.{extension}'
