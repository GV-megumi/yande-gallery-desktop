# ============================================================
# Yande Gallery Desktop 配置文件
# ============================================================
#
# 本文件由 .env 中的 CONFIG_DIR 指定存放位置
# 默认位于: ~/.yandegallery/config.yaml
#
# 目录结构说明:
#   CONFIG_DIR/                    （由 .env CONFIG_DIR 指定，默认 ~/.yandegallery）
#     config.yaml                  本配置文件
#     gallery.db                   SQLite 数据库
#     data/                        运行数据目录（由下方 dataPath 指定）
#       thumbnails/                缩略图缓存（WebP 格式）
#       cache/                     Booru 图片缓存
#       app.log                    应用日志
#
# 路径规则:
#   - database.path    相对于 CONFIG_DIR
#   - dataPath         相对于 CONFIG_DIR
#   - thumbnails / logging 等  相对于 dataPath
#   - downloads.path / galleries.folders[].path  建议使用绝对路径
#   - 所有路径字段均支持绝对路径，绝对路径时忽略基准目录
# ============================================================

# 运行数据目录（缩略图、缓存、日志等）
# 支持绝对路径和相对路径（相对于 CONFIG_DIR）
dataPath: data

# -------- 数据库 --------
database:
  # 相对于 CONFIG_DIR（与 config.yaml 同级）
  path: gallery.db
  logging: true

# -------- 下载 --------
downloads:
  # 建议使用绝对路径，如 M:\downloads 或 /home/user/downloads
  path: ./downloads
  createSubfolders: true
  subfolderFormat:
    - tags
    - date

# -------- 图库 --------
galleries:
  folders:
    - path: /path/to/your/images    # 绝对路径
      name: my_gallery
      autoScan: true
      recursive: true
      extensions:
        - .jpg
        - .jpeg
        - .png
        - .gif
        - .webp
        - .bmp

# -------- 缩略图 --------
thumbnails:
  # 相对于 dataPath
  cachePath: thumbnails
  maxWidth: 1000
  maxHeight: 1000
  quality: 95
  format: webp

# -------- 应用 --------
app:
  recentImagesCount: 100
  pageSize: 50
  defaultViewMode: grid     # grid | list
  showImageInfo: true
  autoScan: true
  autoScanInterval: 30      # 自动扫描间隔（分钟）

# -------- Yande.re API --------
yande:
  apiUrl: https://yande.re/post.json
  pageSize: 20
  downloadTimeout: 60       # 单文件下载超时（秒）
  maxConcurrentDownloads: 5

# -------- 日志 --------
logging:
  # 相对于 dataPath
  filePath: app.log
  level: info               # debug | info | warn | error
  consoleOutput: true
  maxFileSize: 10            # 单文件最大大小（MB）
  maxFiles: 5                # 最多保留文件数

# -------- 网络/代理 --------
network:
  proxy:
    enabled: false
    protocol: http           # http | https | socks5
    host: 127.0.0.1
    port: '7890'
    username: ''
    password: ''

# -------- Booru 浏览与下载 --------
booru:
  appearance:
    gridSize: 300            # 图片网格大小（像素）
    previewQuality: original # auto | low | medium | high | original
    itemsPerPage: 60
    paginationPosition: both # top | bottom | both
    pageMode: pagination     # pagination | infinite
    spacing: 16              # 间距（像素）
    borderRadius: 8          # 圆角（像素）
    margin: 24               # 边距（像素）
    maxCacheSizeMB: 3000     # 图片缓存上限（MB）
  download:
    # 文件名模板，支持的 token:
    #   {id} {md5} {md5:maxlength=8} {extension}
    #   {width} {height} {rating} {score} {site}
    #   {tags:maxlength=50} {source}
    filenameTemplate: '{id}_{md5:maxlength=8}.{extension}'
    # Token 默认选项：命名模板中未显式指定时的后备策略
    # 可选键：limit / maxlength / case / delimiter / unsafe / format /
    #         single_letter / pad_left / sort:{attribute,order}
    tokenDefaults:
      tags:
        limit: 10
        maxlength: 50
        case: lower           # lower | upper | none
        delimiter: _
        unsafe: false
      artist:
        limit: 5
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      character:
        limit: 5
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      copyright:
        limit: 3
        maxlength: 30
        case: lower
        delimiter: _
        unsafe: false
      date:
        format: yyyy-MM-dd
      rating:
        case: lower
        single_letter: false
      site:
        case: lower
      id:
        pad_left: 0
      md5:
        maxlength: 32
      width:
        unsafe: true
      height:
        unsafe: true

# -------- 批量下载 --------
bulkDownload:
  # 同一时刻允许的活跃会话数（dryRun + running），超限会话进入 queued
  maxConcurrentSessions: 3

# -------- 桌面通知 --------
# 三级判断：enabled AND byStatus[status] AND 任务级 notifications
notifications:
  enabled: true              # 全局通知总开关
  byStatus:
    completed: true          # 会话成功完成时弹通知
    failed: true             # 会话失败时弹通知
    allSkipped: true         # 全部跳过时弹通知
  singleDownload:
    enabled: false           # 单次下载（Booru 逐张）是否弹通知
  clickAction: openDownloadHub  # focus | openDownloadHub | openSessionDetail

# -------- 桌面行为 --------
desktop:
  closeAction: hide-to-tray  # 点 X 时行为：hide-to-tray | quit | ask
  autoLaunch: false          # 开机自启
  startMinimized: false      # 自启时隐藏到托盘

# -------- UI 偏好 --------
ui:
  menuOrder:
    # 各菜单区域的排列顺序，留空则使用默认顺序
    # 可在界面中长按菜单项拖拽调整，自动写入此处
    main:    []              # gallery | booru
    gallery: []              # recent | all | galleries
    booru:   []              # posts | popular | pools | favorites | server-favorites | ...
